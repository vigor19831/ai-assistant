# =============================================================================
# ОСНОВНЫЕ НАСТРОЙКИ ПРИЛОЖЕНИЯ
# =============================================================================

app_name: ai-assistant      # Имя приложения (для логов)
debug: false                # Режим отладки: true = подробные ошибки в API
host: 127.0.0.1             # На каком IP слушать. 127.0.0.1 = только локально
port: 8000                  # Порт сервера. Открывайте http://127.0.0.1:8000/ui
config_version: "1"         # Версия формата конфига. Не трогайте.

# =============================================================================
# CORS — РАЗРЕШЕНИЕ КРОСС-ДОМЕННЫХ ЗАПРОСОВ
# =============================================================================
# Нужно, если фронтенд (UI) работает на другом порте/домене.
# Для локальной работы оставьте как есть.

cors:
  allow_origins:
    - "http://localhost"
    - "http://127.0.0.1"
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# =============================================================================
# ЧАТ — ОГРАНИЧЕНИЯ ДИАЛОГА
# =============================================================================
# Сколько сообщений хранить в памяти и сколько токенов отдавать LLM.

chat:
  history_limit: 10           # Сколько последних сообщений помнит бот
  max_context_tokens: 4096    # Макс. токенов в контексте (зависит от модели)

# =============================================================================
# ЧАНКЕР — РАЗБИЕНИЕ ДОКУМЕНТОВ НА КУСКИ
# =============================================================================
# Длинные документы режутся на куски (чанки) перед индексацией.
# chunk_size: сколько символов в одном куске.
# chunk_overlap: сколько символов перекрывать между соседними кусками.

chunker:
  provider: simple
  chunk_size: 512
  chunk_overlap: 50

# =============================================================================
# ТОКЕНИЗАТОР — ПОДСЧЕТ ТОКЕНОВ
# =============================================================================
# Нужен, чтобы не превысить лимит контекста LLM.
# tiktoken = OpenAI-стиль. Для локальных моделей скачайте токенизаторы:
#   python run_scripts.py → download_tokenizers.py

tokenizer:
  provider: tiktoken
  local_dir: ./data/tokenizers

# =============================================================================
# ЭМБЕДДЕР — ВЕКТОРНЫЕ ПРЕДСТАВЛЕНИЯ ТЕКСТА
# =============================================================================
# Превращает текст в числовые векторы для поиска.
# Должен быть запущен отдельный сервер (llama.cpp, Ollama и т.д.).
# dim = размерность вектора. ДОЛЖНА совпадать с vector_store.dim!

embedder:
  provider: openai_compatible
  api_base: http://127.0.0.1:8081/v1   # Адрес сервера эмбеддингов
  api_key: null                        # Ключ, если требуется
  model: embeddinggemma-300m-q8_0      # Имя модели на сервере
  dim: 768                             # Размерность вектора
  timeout: 60.0
  connect_timeout: 5.0
  n_gpu_layers: 0
  n_batch: 512
  n_ubatch: 64
  mmap: true
  mlock: false

# =============================================================================
# LLM — ЯЗЫКОВАЯ МОДЕЛЬ (ГЕНЕРАЦИЯ ОТВЕТОВ)
# =============================================================================
# Главный мозг. Должен быть запущен отдельный сервер.
# server_context_size = контекстное окно модели (сколько токенов помнит).

llm:
  provider: openai_compatible
  api_base: http://127.0.0.1:8080/v1   # Адрес сервера LLM
  api_key: null
  model: gemma-4-e2b-it
  available_models:
    - gemma-4-e2b-it
  max_tokens: 4096                     # Макс. токенов в ответе
  temperature: 0.3                     # Точность для RAG: 0 = точно, 1 = свободно
  top_p: 0.95
  top_k: 40
  min_p: 0.05
  repeat_penalty: 1.1
  presence_penalty: 0.0
  frequency_penalty: 0.0
  stop_sequences: []
  timeout: 300.0
  connect_timeout: 5.0
  server_context_size: 4096            # Размер контекста модели
  n_gpu_layers: 33                     # Сколько слоёв на GPU (-1 = все, 0 = CPU)
  n_batch: 512
  n_ubatch: 64
  mmap: true
  mlock: false

# =============================================================================
# ВЕКТОРНОЕ ХРАНИЛИЩЕ — ГДЕ ХРАНЯТСЯ ИНДЕКСЫ
# =============================================================================
# Индексы = векторы + метаданные документов.
# faiss = на диске (persistent). memory = в RAM (пропадает при перезапуске).
# dim ДОЛЖЕН совпадать с embedder.dim!

vector_store:
  provider: faiss
  index_path: ./data/indices           # Папка для файлов индексов
  metric: cosine                      # Метрика расстояния: l2, cosine, ip
  dim: 768                             # Размерность вектора = embedder.dim
  max_chunks: 100000                   # Макс. чанков на namespace
  max_document_size: 10485760          # Макс. размер одного файла (10 МБ)

# =============================================================================
# ХРАНИЛИЩЕ ЧАТОВ (SQLITE)
# =============================================================================

storage:
  provider: sqlite
  db_path: ./data/storage.db

# =============================================================================
# РЕРАНКЕР — УЛУЧШЕНИЕ РЕЗУЛЬТАТОВ ПОИСКА
# =============================================================================
# Дополнительная модель, которая пересортировывает найденные чанки.
# provider: null = выключен. "api" = внешний сервер (Cohere, Jina и т.д.).

reranker:
  provider: local
  model: bge_reranker_v2_m3
  api_base: http://127.0.0.1:8082
  api_key: null
  timeout: 30.0
  threshold: 0.3


# =============================================================================
# RAG — ИСТОЧНИКИ ДОКУМЕНТОВ И ПАРАМЕТРЫ ПОИСКА
# =============================================================================
# sources = список папок с документами для индексации.
#   namespace = имя коллекции (должно совпадать с namespaces ниже).
#   path = путь к папке (можно абсолютный: D:\rag\test).
#   include = какие файлы читать.
#   recursive = искать в подпапках?
#
# Как добавить новую папку:
#   1. Создать папку (например D:\rag\work)
#   2. Добавить блок в sources (см. пример ниже)
#   3. Добавить namespace в секцию namespaces ниже
#   4. Запустить реиндекс: python run_scripts.py → index_documents.py
#
# top_k = сколько чанков извлекать при поиске.
# relevance_threshold = минимальная релевантность (0.1 = мягко, 0.5 = строго).

rag:
  steps:
    - embed_query
    - retrieve
    - rerank
    - build_context
    - generate
  prompt_version: v1
  prompt_name: rag_simple
  top_k: 3
  default_namespace: "test"
  relevance_threshold: 0.2
  token_margin_min: 512
  token_margin_pct: 0.15

  # ===== ИСТОЧНИКИ ДОКУМЕНТОВ =====
  # Для каждой папки — свой блок. Порядок не важен.
  sources:
    # Встроенный тестовый набор. Исходник: scripts/test.txt.
    # check_rag.py --auto-index копирует [SOURCES] сюда перед индексацией.
    - namespace: test
      path: ./data/documents/test
      include: ["*.txt"]
      recursive: false

    # Пример: рабочие документы (префикс [w] в чате)
    # - namespace: work
    #   path: D:\rag\work
    #   include: ["*.md", "*.txt", "*.pdf"]
    #   recursive: true

    # Пример: книги (только .md, без подпапок)
    # - namespace: books
    #   path: D:\rag\books
    #   include: ["*.md"]
    #   recursive: false

  # Куда сохранять экспорты чатов (если включено)
  chat_exports_root: data/chat_exports
  index_chat_exports: false

# =============================================================================
# NAMESPACES — НАСТРОЙКИ ПОИСКА ПО КАЖДОЙ БАЗЕ
# =============================================================================
# Каждый namespace здесь ДОЛЖЕН совпадать с namespace в rag.sources.
# prefix = короткий код для чата: [d] привет → ищет в default.
# threshold = минимальная релевантность.
# chunk_size = размер чанка (можно отличаться от глобального chunker).
# prompt = стиль ответа: rag_strict (точно), rag_default, rag_creative.

namespaces:
  test:                 # [t] — ваша папка test
    prefix: t
    threshold: 0.2
    chunk_size: 512
    prompt: rag_simple

# =============================================================================
# БЕЗОПАСНОСТЬ
# =============================================================================
# api_key = ключ для доступа к API. null = без ключа (только localhost).
# admin_enabled = включить ли эндпоинты /admin/*.
# openai_routes_require_auth = требовать ли ключ для /v1/chat/completions.

security:
  api_key: local
  admin_enabled: false
  max_body_size: 10485760
  allowed_hosts:
    - "localhost"
    - "127.0.0.1"
  openai_routes_require_auth: true

# =============================================================================
# ЛОГИРОВАНИЕ
# =============================================================================
# level: DEBUG, INFO, WARNING, ERROR.
# format: text (читаемый) или json (для машин).
# file: путь к файлу логов. null = только в консоль.

logging:
  level: "INFO"
  file: "./data/app.log"
  format: "text"
  max_bytes: 10485760
  backup_count: 2

# =============================================================================
# UI — ПУТЬ К ФРОНТЕНДУ
# =============================================================================
# Должен совпадать с реальным расположением папки ui.
# Если ui в src/ai_assistant/ui/ — оставьте "./ui".

ui:
  static_path: "./ui"
