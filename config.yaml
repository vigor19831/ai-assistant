# ═══════════════════════════════════════════════════════════════
# AI Assistant — Универсальная конфигурация
# Работает с любым OpenAI-compatible API: llama-server, Ollama, vLLM, OpenAI
# Переменные окружения с префиксом AI_* переопределяют значения ниже
# ═══════════════════════════════════════════════════════════════

# ── Приложение ──
app_name: ai-assistant
debug: false
host: 0.0.0.0
port: 8000
config_version: "2.0.0"

# ── CORS ──
cors:
  allow_origins:
    - "http://localhost"
    - "http://127.0.0.1"
    - "null"
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# ── Chat ──
chat:
  history_limit: 10
  max_context_tokens: 4096
  tokenizer_model: "gpt-4o"

# ── Chunker ──
chunker:
  provider: simple
  chunk_size: 512
  chunk_overlap: 50

# ── Embedder: локальный сервер с OpenAI-compatible API ──
# Для llama-server: запусти с тем же --port, эмбеддинги на /v1/embeddings
# Для Ollama:       поменяй api_base на http://127.0.0.1:11434/v1
# Для OpenAI:       https://api.openai.com/v1 (api_key обязателен)
embedder:
  provider: openai_compatible
  api_base: http://127.0.0.1:8080/v1
  api_key: null
  model: nomic-embed-text
  dim: 768
  timeout: 60.0

# ── LLM: локальный сервер с OpenAI-compatible API ──
# Для llama-server:  llama-server.exe -m model.gguf --port 8080
# Для Ollama:        ollama serve  (порт 11434)
# Для vLLM:          python -m vllm.entrypoints.openai.api_server --model ...
# Для OpenAI:        https://api.openai.com/v1  (api_key обязателен)
llm:
  provider: openai_compatible
  api_base: http://127.0.0.1:8080/v1
  api_key: null
  model: gemma-3-4b-it
  available_models:
    - gemma-3-4b-it
    - qwen2.5-7b-instruct
    - llama-3.2-3b-instruct
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.95
  top_k: 40
  min_p: 0.05
  repeat_penalty: 1.1
  presence_penalty: 0.0
  frequency_penalty: 0.0
  stop_sequences: []
  timeout: 300.0
  system_message: |
    Пиши на языке пользователя.
    Соблюдай правописание, делай правильную разметку.
    Краткость и правда без фантазии - твоя основа.

# ── Vector Store ──
vector_store:
  provider: memory
  index_path: ./data/indices
  metric: l2
  dim: 768                # ← ОБЯЗАТЕЛЬНО равно embedder.dim
  relevance_threshold: 0.3

# ── Storage ──
storage:
  provider: sqlite
  db_path: ./data/storage.db

# ── Voice ──
voice:
  enabled: false
  recognizer_provider: whisper_local
  synthesizer_provider: piper

# ── Vision ──
vision:
  enabled: false
  provider: clip_local

# ── Reranker ──
reranker:
  provider: dummy
  model: rerank-multilingual-v3.0
  api_base: https://api.cohere.com
  api_key: null
  timeout: 30.0
  threshold: 0.3

# ── RAG ──
rag:
  steps:
    - embed_query
    - retrieve
    - rerank
    - build_context
    - generate
  prompt_version: v1
  prompt_name: rag_strict
  top_k: 5
  default_namespace: "default"
  relevance_threshold: 0.3

# ── Безопасность ──
security:
  api_key: null
  rate_limit: "100/minute"
  max_body_size: 10485760
  allowed_hosts: ["localhost", "127.0.0.1"]
