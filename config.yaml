# AI Assistant — Универсальная конфигурация
# Работает с любым OpenAI-compatible API: llama-server, Ollama, vLLM, OpenAI
# Переменные окружения с префиксом AI_* переопределяют значения ниже

# ── Приложение ──
app_name: ai-assistant
debug: true
host: 0.0.0.0
port: 8000
config_version: "1.5.0"

# ── CORS ──
cors:
  allow_origins:
    - "http://localhost"
    - "http://127.0.0.1"
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# ── Chat ──
chat:
  history_limit: 10
  max_context_tokens: 4096
  tokenizer_model: "gpt-4o"
  tokenizer_local_dir: "./data/tokenizers"

# ── Chunker ──
chunker:
  provider: simple
  chunk_size: 512
  chunk_overlap: 50

# ── Embedder ──
embedder:
  provider: openai_compatible
  api_base: http://127.0.0.1:8081/v1
  api_key: sk-local-api-key
  model: embeddinggemma-300m-q8_0
  dim: 768
  timeout: 60.0
  connect_timeout: 5.0  # Таймаут на установку TCP-соединения (None = использовать timeout)
  n_gpu_layers: 0        # -1 = все слои на GPU, 0 = только CPU, 10 = 10 слоёв на GPU
  n_batch: 512            # размер батча для обработки
  n_ubatch: 64            # микро-батч
  mmap: true              # memory-mapped файлы (экономия RAM)
  mlock: false            # блокировка страниц в RAM (не выгружать в swap)

# ── LLM ──
llm:
  provider: openai_compatible
  api_base: http://127.0.0.1:8080/v1
  api_key: sk-local-api-key
  model: gemma-4-e2b-it
  available_models:
    - gemma-4-e2b-it
    - phi-4-mini-reasoning
    - qwen3.5-4b
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.95
  top_k: 40
  min_p: 0.05
  repeat_penalty: 1.1
  presence_penalty: 0.0
  frequency_penalty: 0.0
  stop_sequences: []
  timeout: 300.0
  connect_timeout: 5.0  # Таймаут на установку TCP-соединения (None = использовать timeout)
  server_context_size: 4096
  # === GPU / Performance ===
  n_gpu_layers: 99        # -1 = все слои на GPU, 0 = только CPU
  n_batch: 512            # размер батча
  n_ubatch: 64            # микро-батч
  mmap: true              # memory-mapped файлы
  mlock: false            # блокировка страниц в RAM

# ── Vector Store ──
vector_store:
  provider: faiss
  index_path: ./data/indices
  metric: l2
  dim: 768                # ← ОБЯЗАТЕЛЬНО равно embedder.dim
  max_chunks: 100000
  max_document_size: 10485760

# ── Storage ──
storage:
  provider: sqlite
  db_path: ./data/storage.db


# ── Reranker ──
reranker:
  provider: null
  model: rerank-multilingual-v3.0
  api_base: https://api.cohere.com
  api_key: sk-local-api-key
  timeout: 30.0
  threshold: 0.3

# ── RAG ──
rag:
  steps:
    - embed_query
    - retrieve
    - rerank
    - build_context
    - generate
  prompt_version: v1
  prompt_name: rag_strict
  top_k: 5
  default_namespace: "default"
  relevance_threshold: 0.1
  max_tool_iterations: 5

# ── Namespaces ──
namespaces:
  personal:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict
  work:
    threshold: 0.3
    chunk_size: 1024
    prompt: rag_creative
  other:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict
  code:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict
  books:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict

# ── Безопасность ──
security:
  api_key: sk-local-api-key
  max_body_size: 10485760
  allowed_hosts: ["localhost", "127.0.0.1"]

# ── Logging ──
logging:
  level: "INFO"       # DEBUG, INFO, WARNING, ERROR
  file: "./data/app.log"
  format: "text"      # "text" or "json"
  max_bytes: 10485760 # 10 MB per log file before rotation
  backup_count: 2     # keep 2 backup files (app.log.1, app.log.2)
