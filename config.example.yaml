# AI Assistant — Universal Configuration
# ============================================================================
# Works with ANY OpenAI-compatible API: llama.cpp (llama-server), Ollama,
# vLLM, TabbyAPI, or remote OpenAI/Claude.
#
# Environment variables with AI_ prefix override any value below.
# Example: AI_LLM__API_BASE=http://localhost:1234/v1
# ============================================================================

# ── Application ──
# Basic server settings. Usually no need to change.
app_name: ai-assistant
debug: false                    # true = detailed errors, hot reload; false for daily use
host: 0.0.0.0                   # 0.0.0.0 = all interfaces; 127.0.0.1 for local-only
port: 8000
config_version: "1.6.0"         # Internal schema version. Do not change.

# ── CORS ──
# Which browser extensions / web UIs can talk to this API.
# Keep localhost entries for local tools (Page Assist, etc.)
cors:
  allow_origins:
    - "http://localhost"
    - "http://127.0.0.1"
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# ── Chat ──
# Conversation history and token counting.
# tokenizer_model is just a label for counting tokens; does NOT need to match
# your actual GGUF model. "gpt-4o" works fine as a generic estimator.
chat:
  history_limit: 10             # How many recent messages to send to the LLM
  max_context_tokens: 4096      # Hard cap on prompt size (prevents overflow)
  tokenizer_model: "gpt-4o"     # Token counting label (affects estimation only)
  tokenizer_local_dir: "./data/tokenizers"  # Cached HF tokenizers for offline use

# ── Chunker ──
# Splits your documents into pieces before embedding.
# Simple = fixed-size chunks with overlap. Good enough for 99% of cases.
chunker:
  provider: simple
  chunk_size: 512               # Characters per chunk. 512 = good balance
  chunk_overlap: 50             # Shared chars between chunks (keeps context)

# ── Embedder ──
# Converts text into vectors for semantic search.
# YOU MUST RUN A SEPARATE EMBEDDING SERVER (e.g., llama-server with nomic-embed-text).
# Or use Ollama: "http://localhost:11434/v1" with model "nomic-embed-text".
#
# dim MUST match vector_store.dim below (both 768 or both 384, etc.)
embedder:
  provider: openai_compatible   # "mock" for testing without server
  api_base: http://127.0.0.1:8081/v1   # Your embedding server URL
  api_key: null                 # Set to "sk-xxx" or use AI_EMBEDDER_API_KEY env var
  model: "nomic-embed-text"     # Model name ON YOUR SERVER (not a HuggingFace ID)
  dim: 768                      # Vector size from your embedding model
  timeout: 60.0
  connect_timeout: 5.0
  # --- llama.cpp-specific (safe to ignore for Ollama/vLLM) ---
  n_gpu_layers: 0               # GPU layers: -1=all, 0=CPU only, N=partial
  n_batch: 512
  n_ubatch: 64
  mmap: true                    # Memory-map model (saves RAM, slightly slower)
  mlock: false                  # Lock in RAM (prevents swap; needs enough RAM)

# ── LLM ──
# Your main chat model. ANY OpenAI-compatible endpoint works.
# llama.cpp (llama-server):  http://127.0.0.1:8080/v1
# Ollama:                    http://localhost:11434/v1
# TabbyAPI:                  http://localhost:5000/v1
# vLLM:                      http://localhost:8000/v1
# Remote (OpenAI, etc.):     https://api.openai.com/v1
llm:
  provider: openai_compatible
  api_base: http://127.0.0.1:8080/v1   # <-- CHANGE THIS to your server
  api_key: null                 # Set to "sk-xxx" or use AI_LLM_API_KEY env var
  model: "your-model-name"      # Model identifier ON YOUR SERVER (arbitrary string)
  available_models:             # Listed in /v1/models endpoint; can be just [model]
    - "your-model-name"
  max_tokens: 4096              # Max response length
  temperature: 0.7              # 0.0 = deterministic, 1.0 = very creative
  top_p: 0.95                   # Nucleus sampling (1.0 = disabled)
  top_k: 40                     # Limit to top-K tokens (-1 = disabled)
  min_p: 0.05                   # Minimum token probability
  repeat_penalty: 1.1           # >1.0 reduces repetition
  presence_penalty: 0.0
  frequency_penalty: 0.0
  stop_sequences: []            # Strings that stop generation, e.g. ["User:", "Assistant:"]
  timeout: 300.0
  connect_timeout: 5.0
  server_context_size: 4096     # Context window your server claims (for margin calc)
  # --- llama.cpp-specific (safe to ignore for Ollama/vLLM) ---
  n_gpu_layers: 99              # 99 = almost all layers on GPU (for large GPUs)
  n_batch: 512
  n_ubatch: 64
  mmap: true
  mlock: false

# ── Vector Store ──
# Where document embeddings live for RAG retrieval.
# "faiss" = persistent files (needs faiss-cpu: pip install faiss-cpu)
# "memory" = ephemeral, lost on restart (good for testing)
vector_store:
  provider: faiss
  index_path: ./data/indices    # Directory for FAISS files
  metric: l2                    # Distance: "l2", "cosine", or "ip"
  dim: 768                      # MUST equal embedder.dim above
  max_chunks: 100000            # Per-namespace limit (FIFO eviction)
  max_document_size: 10485760   # 10 MB — reject larger uploads

# ── Storage ──
# Chat history and settings persistence.
# "sqlite" = file-based, no extra dependencies.
storage:
  provider: sqlite
  db_path: ./data/storage.db

# ── Reranker ──
# Optional second-pass relevance scoring. Usually not needed for local use.
# Set provider to null (YAML null, not string) to disable.
# "api" = external service (Cohere, Jina, etc.)
reranker:
  provider: null
  model: "rerank-multilingual-v3.0"
  api_base: https://api.cohere.com
  api_key: null
  timeout: 30.0
  threshold: 0.3                # Minimum score to keep a chunk (0.0-1.0)

# ── RAG ──
# Retrieval-Augmented Generation pipeline.
# Steps run in order. You can reorder or skip steps (e.g., remove rerank).
rag:
  steps:
    - embed_query              # 1. Convert query to vector
    - retrieve                 # 2. Find similar chunks
    - rerank                   # 3. Re-score (skip if reranker disabled)
    - build_context            # 4. Assemble chunks into prompt
    - generate                 # 5. Send to LLM for answer
  prompt_version: v1            # Template directory: core/prompts/v1/
  prompt_name: rag_strict       # rag_strict / rag_default / rag_creative
  top_k: 5                      # Chunks to retrieve
  default_namespace: "default"  # Namespace when no [p]/[w]/etc. prefix
  relevance_threshold: 0.1      # Minimum similarity score (post-reranker)
  max_tool_iterations: 5        # Reserved for future tool use
  token_margin_min: 256         # Tokens reserved for LLM response (prevents cutoff)
  token_margin_pct: 0.1         # 10% of context window reserved for response
  chat_exports_root: "data/chat_exports"
  index_chat_exports: false     # Auto-index saved chats into RAG

# ── Namespaces ──
# Per-collection overrides. Prefix in chat triggers namespace:
# [p] = personal, [w] = work, [c] = code, [b] = books, [o] = other
# Example: "[w] quarterly report" searches work namespace with work settings.
namespaces:
  personal:
    threshold: 0.1              # Similarity cutoff (lower = more results)
    chunk_size: 512
    prompt: rag_strict
  work:
    threshold: 0.3              # Stricter = higher quality
    chunk_size: 1024            # Larger chunks for long documents
    prompt: rag_creative
  other:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict
  code:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict
  books:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict

# ── Security ──
# API key protection. Set api_key or use AI_SECURITY_API_KEY env var.
# admin_enabled = false means /admin endpoints return 404 (safer).
security:
  api_key: null
  admin_enabled: false
  max_body_size: 10485760       # 10 MB max request body
  allowed_hosts: ["localhost", "127.0.0.1"]

# ── Logging ──
# Application logs. "text" = human-readable, "json" = structured.
logging:
  level: "INFO"                 # DEBUG, INFO, WARNING, ERROR
  file: "./data/app.log"
  format: "text"
  max_bytes: 10485760           # 10 MB per file before rotation
  backup_count: 2               # Keep 2 old log files

# ── UI ──
# Static web interface files. Relative to src/ai_assistant/api/static.py.
# Usually no need to change.
ui:
  static_path: "../../ui"
