# =============================================================================
# AI ASSISTANT — CONFIGURATION
# =============================================================================
# Copy this file to config.yaml and edit values for your setup.
# See README.md for setup instructions.

app_name: ai-assistant
debug: false
host: 127.0.0.1
port: 8000
config_version: "1"

# =============================================================================
# CORS — CROSS-ORIGIN REQUESTS
# =============================================================================
# Required if frontend runs on different port/domain.

cors:
  allow_origins:
    - "http://localhost"
    - "http://127.0.0.1"
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# =============================================================================
# CHAT — DIALOGUE LIMITS
# =============================================================================

chat:
  history_limit: 10
  max_context_tokens: 4096

# =============================================================================
# CHUNKER — DOCUMENT SPLITTING
# =============================================================================
# chunk_size: characters per chunk.
# chunk_overlap: overlap between adjacent chunks.

chunker:
  provider: simple
  chunk_size: 512
  chunk_overlap: 50

# =============================================================================
# TOKENIZER — TOKEN COUNTING
# =============================================================================
# tiktoken = OpenAI-style. For local models, download tokenizers:
#   python run_scripts.py → download_tokenizers.py

tokenizer:
  provider: tiktoken
  local_dir: ./data/tokenizers

# =============================================================================
# EMBEDDER — TEXT VECTORIZATION
# =============================================================================
# Must match a running server (llama.cpp, Ollama, etc.).
# dim MUST match vector_store.dim!

embedder:
  provider: openai_compatible
  api_base: http://127.0.0.1:8081/v1
  api_key: null
  model: CHANGE_ME
  dim: 768
  timeout: 60.0
  connect_timeout: 5.0
  n_gpu_layers: 0
  n_batch: 512
  n_ubatch: 64
  mmap: true
  mlock: false

# =============================================================================
# LLM — LANGUAGE MODEL (GENERATION)
# =============================================================================
# Must match a running server.
# server_context_size = model's context window.

llm:
  provider: openai_compatible
  api_base: http://127.0.0.1:8080/v1
  api_key: null
  model: CHANGE_ME
  available_models:
    - CHANGE_ME
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.95
  top_k: 40
  min_p: 0.05
  repeat_penalty: 1.1
  presence_penalty: 0.0
  frequency_penalty: 0.0
  stop_sequences: []
  timeout: 300.0
  connect_timeout: 5.0
  server_context_size: 4096
  n_gpu_layers: -1
  n_batch: 512
  n_ubatch: 64
  mmap: true
  mlock: false

# =============================================================================
# VECTOR STORE — WHERE INDICES LIVE
# =============================================================================
# faiss = disk (persistent). memory = RAM (lost on restart).
# dim MUST match embedder.dim!

vector_store:
  provider: faiss
  index_path: ./data/indices
  metric: cosine
  dim: 768
  max_chunks: 100000
  max_document_size: 10485760

# =============================================================================
# CHAT STORAGE (SQLITE)
# =============================================================================

storage:
  provider: sqlite
  db_path: ./data/storage.db

# =============================================================================
# RERANKER — SEARCH RESULT IMPROVEMENT
# =============================================================================
# null = disabled. "api" = external server (Cohere, Jina, etc.).
# "local" = local HTTP server (bge-reranker, etc.).

reranker:
  provider: null
  model: null
  api_base: http://127.0.0.1:8082
  api_key: null
  timeout: 30.0

# =============================================================================
# RAG — DOCUMENT SOURCES AND SEARCH PARAMETERS
# =============================================================================
# sources = list of folders to index.
#   namespace = collection name (must match namespaces below).
#   path = folder path (relative or absolute).
#   include = which files to read.
#   recursive = search subfolders?
#
# To add a new folder:
#   1. Create folder (e.g., ./data/documents/work)
#   2. Add block to sources below
#   3. Add namespace to namespaces section below
#   4. Run reindex: python run_scripts.py → index_documents.py
#
# top_k = how many chunks to retrieve.

rag:
  steps:
    - embed_query
    - retrieve
    - rerank
    - build_context
    - generate
  prompt_version: v1
  # prompt_name: rag_strict works with all models.
  # For models <8B params, consider reducing top_k to 2 if noise leaks.
  prompt_name: rag_strict
  top_k: 3
  default_namespace: "test"
  token_margin_min: 512
  token_margin_pct: 0.15

  sources:
    - namespace: test
      path: ./data/documents/test
      include: ["*.txt"]
      recursive: false

    # Example: work documents (prefix [w] in chat)
    # - namespace: work
    #   path: ./data/documents/work
    #   include: ["*.md", "*.txt", "*.pdf"]
    #   recursive: true

  chat_exports_root: data/chat_exports
  index_chat_exports: false

# =============================================================================
# NAMESPACES — PER-COLLECTION SETTINGS
# =============================================================================
# Each namespace MUST match a namespace in rag.sources.
# prefix = short code for chat: [t] hello → searches in test.
# chunk_size = chunk size (can differ from global chunker).
# prompt = response style: rag_strict (exact).

namespaces:
  test:
    prefix: t
    chunk_size: 512
    prompt: rag_strict

# =============================================================================
# SECURITY
# =============================================================================
# api_key = API access key. null = no key (localhost only).
# admin_enabled = enable /admin/* endpoints.

security:
  api_key: null
  admin_enabled: false
  max_body_size: 10485760
  allowed_hosts:
    - "localhost"
    - "127.0.0.1"
  openai_routes_require_auth: true

# =============================================================================
# LOGGING
# =============================================================================

logging:
  level: "INFO"
  file: "./data/app.log"
  format: "text"
  max_bytes: 10485760
  backup_count: 2

# =============================================================================
# UI — FRONTEND PATH
# =============================================================================

ui:
  static_path: "./ui"
