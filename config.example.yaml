# AI Assistant — Example Configuration
# Copy to config.yaml and edit for your setup.
# Environment variables with AI_ prefix override these values.

# ── Application ──
app_name: ai-assistant
debug: false
host: 0.0.0.0
port: 8000
config_version: "1.5.0"

# ── CORS ──
cors:
  allow_origins:
    - "http://localhost"
    - "http://127.0.0.1"
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

# ── Chat ──
chat:
  history_limit: 10
  max_context_tokens: 4096
  tokenizer_model: "gpt-4o"
  tokenizer_local_dir: "./data/tokenizers"

# ── Chunker ──
chunker:
  provider: simple
  chunk_size: 512
  chunk_overlap: 50

# ── Embedder ──
embedder:
  provider: openai_compatible
  api_base: http://127.0.0.1:8081/v1
  api_key: null  # Set AI_EMBEDDER_API_KEY env var, or paste key here
  model: text-embedding-3-small
  dim: 768
  timeout: 60.0
  connect_timeout: 5.0
  n_gpu_layers: 0
  n_batch: 512
  n_ubatch: 64
  mmap: true
  mlock: false

# ── LLM ──
llm:
  provider: openai_compatible
  api_base: http://127.0.0.1:8080/v1
  api_key: null  # Set AI_LLM_API_KEY env var, or paste key here
  model: gemma-4-e2b-it
  available_models:
    - gemma-4-e2b-it
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.95
  top_k: 40
  min_p: 0.05
  repeat_penalty: 1.1
  presence_penalty: 0.0
  frequency_penalty: 0.0
  stop_sequences: []
  timeout: 300.0
  connect_timeout: 5.0
  server_context_size: 4096
  n_gpu_layers: 99
  n_batch: 512
  n_ubatch: 64
  mmap: true
  mlock: false

# ── Vector Store ──
vector_store:
  provider: faiss
  index_path: ./data/indices
  metric: l2
  dim: 768
  max_chunks: 100000
  max_document_size: 10485760

# ── Storage ──
storage:
  provider: sqlite
  db_path: ./data/storage.db

# ── Reranker ──
reranker:
  provider: null
  model: rerank-multilingual-v3.0
  api_base: https://api.cohere.com
  api_key: null  # Set AI_RERANKER_API_KEY env var, or paste key here
  timeout: 30.0
  threshold: 0.3

# ── RAG ──
rag:
  steps:
    - embed_query
    - retrieve
    - rerank
    - build_context
    - generate
  prompt_version: v1
  prompt_name: rag_strict
  top_k: 5
  default_namespace: "default"
  relevance_threshold: 0.1
  max_tool_iterations: 5
  token_margin_min: 256
  token_margin_pct: 0.1
  chat_exports_root: "chat_exports"
  index_chat_exports: false

# ── Namespaces ──
namespaces:
  personal:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict
  work:
    threshold: 0.3
    chunk_size: 1024
    prompt: rag_creative
  other:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict
  code:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict
  books:
    threshold: 0.1
    chunk_size: 512
    prompt: rag_strict

# ── Security ──
security:
  api_key: null  # Set AI_SECURITY_API_KEY env var, or paste key here
  max_body_size: 10485760
  allowed_hosts: ["localhost", "127.0.0.1"]

# ── Logging ──
logging:
  level: "INFO"
  file: "./data/app.log"
  format: "text"
  max_bytes: 10485760
  backup_count: 2

# ── UI ──
ui:
  static_path: "../../ui"
