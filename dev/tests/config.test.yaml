app_name: ai-assistant-test
debug: false
host: 127.0.0.1
port: 9999

cors:
  allow_origins: ["*"]
  allow_credentials: true
  allow_methods: ["*"]
  allow_headers: ["*"]

chat:
  history_limit: 10

chunker:
  provider: simple
  chunk_size: 512
  chunk_overlap: 50

embedder:
  provider: mock
  api_base: http://127.0.0.1:9991
  dim: 384
  timeout: 5.0

llm:
  provider: mock
  api_base: http://127.0.0.1:9990
  max_tokens: 128
  temperature: 0.7
  timeout: 5.0
  server_context_size: 2048
  system_message: "Test system message."
  stop_sequences: []

vector_store:
  provider: memory
  index_path: ./data/indices/test
  metric: l2
  dim: 384

storage:
  provider: sqlite
  db_path: ./data/test_storage.db

reranker:
  provider: dummy
  timeout: 5.0
  threshold: 0.3

rag:
  steps:
    - embed_query
    - retrieve
    - rerank
    - build_context
    - generate
  prompt_version: v1
  prompt_name: rag_strict
  top_k: 3
  default_namespace: "test_default"
  relevance_threshold: 0.3
