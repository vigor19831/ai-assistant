<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 12px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 { font-size: 16px; font-weight: 600; }
        .namespace-badge {
            background: #238636;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #1f6feb;
            color: white;
        }
        .message.assistant {
            align-self: flex-start;
            background: #21262d;
            border: 1px solid #30363d;
        }
        .message.assistant.streaming::after {
            content: '▋';
            animation: blink 1s infinite;
            margin-left: 4px;
        }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .message code {
            background: #161b22;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.9em;
        }
        .message pre {
            background: #161b22;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .message pre code { padding: 0; background: none; }
        .message p {
            margin-bottom: 12px;
            line-height: 1.6;
        }
        .message p:last-child {
            margin-bottom: 0;
        }
        .message ul, .message ol {
            margin: 8px 0 12px 20px;
            line-height: 1.6;
        }
        .message li {
            margin-bottom: 4px;
        }
        .message h1, .message h2, .message h3, .message h4 {
            margin: 16px 0 8px 0;
            color: #e6edf3;
            font-weight: 600;
        }
        .message h1 { font-size: 18px; }
        .message h2 { font-size: 16px; }
        .message h3 { font-size: 15px; }
        .message h4 { font-size: 14px; }
        .message strong {
            color: #e6edf3;
            font-weight: 600;
        }
        .message a {
            color: #58a6ff;
            text-decoration: none;
        }
        .message a:hover {
            text-decoration: underline;
        }
        .message blockquote {
            border-left: 3px solid #30363d;
            padding-left: 12px;
            margin: 8px 0;
            color: #8b949e;
        }
        .message hr {
            border: none;
            border-top: 1px solid #30363d;
            margin: 16px 0;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        #messageInput {
            width: 100%;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px 16px;
            color: inherit;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 200px;
            font-family: inherit;
        }
        #messageInput:focus { outline: none; border-color: #1f6feb; }
        .send-btn {
            background: #1f6feb;
            color: white;
            border: none;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #388bfd; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .namespace-hint {
            font-size: 12px;
            color: #8b949e;
            padding: 0 20px 8px;
        }
        .namespace-hint code {
            background: #21262d;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Assistant</h1>
        <span class="namespace-badge" id="currentNs">default</span>
    </div>
    <div class="namespace-hint">
        Prefix: <code>[p]</code> personal <code>[w]</code> work <code>[c]</code> code <code>[b]</code> books <code>[o]</code> other
    </div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" rows="1" placeholder="Message... (Shift+Enter for new line)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <script>
        const API_BASE = '';
        const API_KEY = 'sk-local-api-key';
        let conversationId = Math.random().toString(36).substring(2, 15);
        let isStreaming = false;

        const input = document.getElementById('messageInput');
        const container = document.getElementById('chatContainer');
        const nsBadge = document.getElementById('currentNs');

        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 200) + 'px';
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function detectNamespace(text) {
            const match = text.match(/^\[(p|w|c|b|o)\]\s*/i);
            if (match) {
                const map = {p: 'personal', w: 'work', c: 'code', b: 'books', o: 'other'};
                return map[match[1].toLowerCase()] || 'default';
            }
            return 'default';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            // 0. Escape raw HTML to prevent XSS from model output
            text = text.replace(/&/g, '&amp;')
                       .replace(/</g, '&lt;')
                       .replace(/>/g, '&gt;');

            // 1. Protect code blocks (multiline)
            const codeBlocks = [];
            text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
                const placeholder = '\x00CODE' + codeBlocks.length + '\x00';
                codeBlocks.push(code.trim()); // already escaped above
                return placeholder;
            });

            // 2. Protect inline code
            const inlineCodes = [];
            text = text.replace(/`([^`]+)`/g, (_, code) => {
                const placeholder = '\x00INLINE' + inlineCodes.length + '\x00';
                inlineCodes.push(code); // already escaped
                return placeholder;
            });

            // 3. Links [text](url) — before bold/italic to avoid conflicts with brackets
            text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

            // 4. Horizontal rules
            text = text.replace(/^---+$/gm, '<hr>');
            text = text.replace(/^\*\*\*+$/gm, '<hr>');

            // 5. Headers (# syntax)
            text = text.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            text = text.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            text = text.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            text = text.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // 6. Blockquotes — consecutive > lines
            const lines = text.split('\n');
            const result = [];
            let inQuote = false;

            function flushQuote() {
                if (!inQuote) return;
                result.push('</blockquote>');
                inQuote = false;
            }

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const qMatch = line.match(/^&gt; (.*)$/);
                if (qMatch) {
                    if (!inQuote) {
                        result.push('<blockquote>');
                        inQuote = true;
                    }
                    result.push(qMatch[1]);
                } else {
                    flushQuote();
                    result.push(line);
                }
            }
            flushQuote();
            text = result.join('\n');

            // 7. Bold + italic — longest first, with boundary checks
            text = text.replace(/(?<!\*)\*\*\*([^*\n]+)\*\*\*(?!\*)/g, '<strong><em>$1</em></strong>');
            text = text.replace(/(?<!\*)\*\*([^*\n]+)\*\*(?!\*)/g, '<strong>$1</strong>');
            text = text.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');

            // 8. Lists — support - and * and 1. 2. etc
            const listLines = text.split('\n');
            const listResult = [];
            let listType = null; // 'ul' or 'ol'
            let listBuffer = [];

            function flushList() {
                if (!listType) return;
                const tag = listType === 'ol' ? 'ol' : 'ul';
                listResult.push('<' + tag + '>' + listBuffer.join('') + '</' + tag + '>');
                listType = null;
                listBuffer = [];
            }

            for (let i = 0; i < listLines.length; i++) {
                const line = listLines[i];
                const ulMatch = line.match(/^[-*] (.*)$/);
                const olMatch = line.match(/^\d+\. (.*)$/);

                if (ulMatch) {
                    if (listType !== 'ul') {
                        flushList();
                        listType = 'ul';
                    }
                    listBuffer.push('<li>' + ulMatch[1] + '</li>');
                } else if (olMatch) {
                    if (listType !== 'ol') {
                        flushList();
                        listType = 'ol';
                    }
                    listBuffer.push('<li>' + olMatch[1] + '</li>');
                } else {
                    flushList();
                    listResult.push(line);
                }
            }
            flushList();
            text = listResult.join('\n');

            // 9. Paragraphs — wrap loose lines, preserve single \n as <br> inside paragraphs
            const blocks = text.split(/\n\n+/);
            text = blocks.map(block => {
                block = block.trim();
                if (!block) return '';
                // Already a block element — don't wrap
                if (/^<(h[1-4]|pre|ul|ol|li|blockquote|hr)/.test(block)) return block;
                // Multiple single newlines inside — convert to <br>
                if (block.includes('\n')) {
                    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
                }
                return '<p>' + block + '</p>';
            }).filter(Boolean).join('');

            // 10. Restore protected content
            codeBlocks.forEach((code, i) => {
                text = text.replace('\x00CODE' + i + '\x00', '<pre><code>' + code + '</code></pre>');
            });
            inlineCodes.forEach((code, i) => {
                text = text.replace('\x00INLINE' + i + '\x00', '<code>' + code + '</code>');
            });

            return text;
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            if (role === 'assistant') div.classList.add('streaming');
            div.innerHTML = role === 'user' ? escapeHtml(text) : renderMarkdown(text);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function updateMessage(div, text) {
            div.innerHTML = renderMarkdown(text);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isStreaming) return;

            const ns = detectNamespace(text);
            nsBadge.textContent = ns;

            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';
            isStreaming = true;
            document.getElementById('sendBtn').disabled = true;

            const assistantDiv = addMessage('assistant', '');

            try {
                const response = await fetch(API_BASE + '/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + API_KEY
                    },
                    body: JSON.stringify({
                        model: 'local',
                        messages: [{role: 'user', content: text}],
                        stream: true
                    })
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const result = await reader.read();
                    if (result.done) break;

                    const chunk = decoder.decode(result.value, {stream: true});
                    const lines = chunk.split('\n');

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;

                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices && parsed.choices[0] && parsed.choices[0].delta && parsed.choices[0].delta.content;
                            if (delta) {
                                fullText += delta;
                                updateMessage(assistantDiv, fullText);
                            }
                        } catch (e) {
                            // Ignore parse errors for ping comments
                        }
                    }
                }

                assistantDiv.classList.remove('streaming');

            } catch (err) {
                assistantDiv.innerHTML = '<span style="color:#f85149">Error: ' + escapeHtml(err.message) + '</span>';
                assistantDiv.classList.remove('streaming');
            }

            isStreaming = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
