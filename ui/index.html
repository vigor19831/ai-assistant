<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 12px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 { font-size: 16px; font-weight: 600; }
        .namespace-badge {
            background: #238636;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #1f6feb;
            color: white;
        }
        .message.assistant {
            align-self: flex-start;
            background: #21262d;
            border: 1px solid #30363d;
        }
        .message.assistant.streaming::after {
            content: '▋';
            animation: blink 1s infinite;
            margin-left: 4px;
        }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .message code {
            background: #161b22;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.9em;
        }
        .message pre {
            background: #161b22;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .message pre code { padding: 0; background: none; }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        #messageInput {
            width: 100%;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px 16px;
            color: inherit;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 200px;
            font-family: inherit;
        }
        #messageInput:focus { outline: none; border-color: #1f6feb; }
        .send-btn {
            background: #1f6feb;
            color: white;
            border: none;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #388bfd; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .namespace-hint {
            font-size: 12px;
            color: #8b949e;
            padding: 0 20px 8px;
        }
        .namespace-hint code {
            background: #21262d;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Assistant</h1>
        <span class="namespace-badge" id="currentNs">default</span>
    </div>
    <div class="namespace-hint">
        Prefix: <code>[p]</code> personal <code>[w]</code> work <code>[c]</code> code <code>[b]</code> books <code>[o]</code> other
    </div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" rows="1" placeholder="Message... (Shift+Enter for new line)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <script>
        const API_BASE = '';
        const API_KEY = 'sk-local-api-key';
        let conversationId = Math.random().toString(36).substring(2, 15);
        let isStreaming = false;

        const input = document.getElementById('messageInput');
        const container = document.getElementById('chatContainer');
        const nsBadge = document.getElementById('currentNs');

        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 200) + 'px';
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function detectNamespace(text) {
            const match = text.match(/^\[(p|w|c|b|o)\]\s*/i);
            if (match) {
                const map = {p: 'personal', w: 'work', c: 'code', b: 'books', o: 'other'};
                return map[match[1].toLowerCase()] || 'default';
            }
            return 'default';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
                return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
            });
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            text = text.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            text = text.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            text = text.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            text = text.replace(/^- (.*$)/gim, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            text = text.replace(/<\/ul>\n?<ul>/g, '');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            if (role === 'assistant') div.classList.add('streaming');
            div.innerHTML = role === 'user' ? escapeHtml(text) : renderMarkdown(text);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function updateMessage(div, text) {
            div.innerHTML = renderMarkdown(text);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isStreaming) return;

            const ns = detectNamespace(text);
            nsBadge.textContent = ns;

            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';
            isStreaming = true;
            document.getElementById('sendBtn').disabled = true;

            const assistantDiv = addMessage('assistant', '');

            try {
                const response = await fetch(API_BASE + '/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + API_KEY
                    },
                    body: JSON.stringify({
                        model: 'local',
                        messages: [{role: 'user', content: text}],
                        stream: true
                    })
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const result = await reader.read();
                    if (result.done) break;

                    const chunk = decoder.decode(result.value, {stream: true});
                    const lines = chunk.split('\n');

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;

                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices && parsed.choices[0] && parsed.choices[0].delta && parsed.choices[0].delta.content;
                            if (delta) {
                                fullText += delta;
                                updateMessage(assistantDiv, fullText);
                            }
                        } catch (e) {
                            // Ignore parse errors for ping comments
                        }
                    }
                }

                assistantDiv.classList.remove('streaming');

            } catch (err) {
                assistantDiv.innerHTML = '<span style="color:#f85149">Error: ' + escapeHtml(err.message) + '</span>';
                assistantDiv.classList.remove('streaming');
            }

            isStreaming = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
